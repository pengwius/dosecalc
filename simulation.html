<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blood Level Simulator ✨</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <style>
        .nav-links {
          display: flex;
          gap: 15px;
          margin-bottom: 20px;
        }
        .nav-links a {
          color: var(--pink-orchid);
          text-decoration: none;
          font-weight: bold;
        }
        .chart-container {
          position: relative;
          width: 100%;
          height: auto;
          min-height: 260px;
          margin-top: 16px;
        }
      </style>
  </head>
  <body>
    <header>
      <h1>Dosecalc 🌸</h1>
      <a id="goToCalculator" href="index.html"></a>
      <button id="themeToggle" aria-label="Toggle theme"></button>
    </header>

    <main class="simulator-layout">
      <section class="card results chart-card" id="simulator-result">
        <div class="chart-header">
          <h2>Blood Concentration</h2>
          <div class="chart-controls">
            <label class="toggle">
              <input type="checkbox" id="splitCharts" />
              Separate charts per hormone
            </label>
          </div>
        </div>
        <div class="chart-container chart-grid" id="chartsContainer">
          <canvas id="bloodChart"></canvas>
        </div>
      </section>

      <section class="card">
        <h2>Simulation Settings</h2>
      <div class="input-row">
          <div class="input-group">
            <label for="biologicalSex">Assigned Sex</label>
            <select id="biologicalSex">
              <option value="amab">AMAB</option>
              <option value="afab">AFAB</option>
            </select>
          </div>
          <div class="input-group">
            <label for="weightKg">Weight (kg)</label>
            <input type="number" id="weightKg" value="70" min="1" step="0.1" />
          </div>
          <div class="input-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" />
          </div>
          <div class="input-group">
            <label for="cycleLength">Simulation Days</label>
            <input type="number" id="cycleLength" value="30" min="7" max="365" />
          </div>
          <div class="input-group">
            <label for="chartTimeUnit">Chart Unit</label>
            <select id="chartTimeUnit">
              <option value="days">Days</option>
              <option value="hours">Hours</option>
            </select>
          </div>
        </div>
        <div class="input-row"><label class="toggle"><input type="checkbox" id="steadyState" /> Start in Steady State</label></div>      </section>

      <section class="card" id="protocolsCard">
        <div class="card-header">
          <h2>Protocols</h2>
          <button id="addProtocol" type="button">Add protocol</button>
        </div>
        <div id="protocolsList"></div>
      </section>

      <button id="resetSimulation" aria-label="Reset defaults" style="width: 100%; padding: 16px; font-weight: bold">
        🔄 Reset Simulator
      </button>
    </main>

    <footer>
      <div class="footer-content">
        <p>
          Made by
          <a
            href="https://github.com/pengwius"
            target="_blank"
            rel="noopener noreferrer"
            >pengwius</a
          >
          with ❤️
        </p>
        <p style="margin-top: -4px">
          <a
            href="https://github.com/pengwius/dosecalc"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub Repository
          </a>
        </p>
        <div class="attribution">
          Icons made by
          <a
            href="https://www.flaticon.com/authors/candy-design"
            title="Candy Design"
            target="_blank"
            rel="noopener noreferrer"
            >Candy Design</a
          >
          from
          <a
            href="https://www.flaticon.com/"
            title="Flaticon"
            target="_blank"
            rel="noopener noreferrer"
            >www.flaticon.com</a
          >
        </div>
      </div>
    </footer>

    <script src="simulation.js"></script>
  </body>
</html>
